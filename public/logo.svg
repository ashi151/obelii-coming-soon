<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Smooth premium dark background to match iOS/Android squircle launcher icon masking -->
  <rect width="512" height="512" rx="112" fill="#0a0b10" />
  
  <!-- Outer glowing luxury gold circle ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00e154" stroke-width="6" opacity="0.9" />
  
  <!-- Inner delicate dashed gold ring for an haute-couture boutique feel -->
  <circle cx="256" cy="256" r="166" fill="none" stroke="#00e154" stroke-width="2" stroke-dasharray="6 6" opacity="0.4" />
  
  <!-- Centerpiece elegant serif "Ó" typography matching Cormorant Garamond / Didot styling -->
  <text x="256" y="320" font-family="'Cormorant Garamond', 'Didot', 'Georgia', serif" font-size="200" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="-0.05em">
    Ó
  </text>
</svg>
